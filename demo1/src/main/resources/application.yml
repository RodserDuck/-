spring:
  application:
    name: campus-life
  jackson:
    serialization:
      write-dates-as-timestamps: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/campus_life?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.campus.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 本地图片存储：项目运行目录下 uploads/（如 demo1\uploads\notice）
# 数据库中存 /uploads/分类/文件名；HTTP 访问为 /api/uploads/...（context-path + 相对路径）
campus:
  upload:
    root: uploads

server:
  port: 8080
  servlet:
    context-path: /api
  tomcat:
    apr:
      enabled: false

jwt:
  secret: CampusLifePlatform2026SecretKeyForJWTTokenGeneration
  expiration: 86400000

# 微信小程序登录（需填写你的小程序 appid/secret）
wechat:
  mini:
    appid: "wx7ba9c9ee446a4cf5"
    secret: "3dc4cfafdbca27a18b9af39677bb5bfa"

logging:
  level:
    com.campus: debug
